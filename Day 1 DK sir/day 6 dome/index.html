<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p id="para-id">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Consequatur.</p>
    <button id="button-id">Click Me</button>

</body>

<script>
    const data = document.getElementById("para-id");
    console.log(data.innerText);

    data.innerText = "This is the new text";
    data.style.color = "red";

    const button = document.getElementById("button-id");
    button.addEventListener("click", function() {
        button.innerText= "ruko";
        button.disabled = true;
        button.style.backgroundColor = "cyan";
        document.body.style.backgroundColor = "black";
        data.style.color = "white";
    });
</script>

</html>
